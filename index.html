<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tư Vấn - Thầy Du Gia Văn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #64748b;
            /* Hiệu ứng kính mờ xịn hơn */
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
        }

        body {
            background-color: var(--bg-body);
            /* Thêm một chút họa tiết nền nhẹ cho chuyên nghiệp */
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 25px 25px;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: var(--text-main);
            padding: 20px 0;
        }

        .registration-card {
            max-width: 650px;
            width: 95%;
            margin: auto;
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            /* Đổ bóng đa lớp tạo chiều sâu (Layered Shadows) */
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 20px 25px -5px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .card-header {
            background: transparent;
            padding: 45px 40px 20px;
            border: none;
            text-align: center;
        }

        .card-header h3 {
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--text-main);
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .card-header p {
            color: var(--text-sub);
            font-size: 0.95rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
            display: block;
            padding-left: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Input tinh tế hơn */
        .form-control,
        .form-select {
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            color: var(--text-main);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #fff;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-1px);
        }

        /* Nút bấm Apple Style */
        .btn-submit {
            background: var(--primary);
            padding: 16px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1rem;
            border: none;
            color: white;
            transition: all 0.3s ease;
            margin-top: 25px;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4);
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5);
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Thông báo thành công */
        #responseMsg {
            background: #f0fdf4 !important;
            color: #166534 !important;
            border: 1px solid #bbf7d0 !important;
            border-radius: 20px;
            padding: 25px !important;
            font-size: 1rem;
        }

        .loading {
            display: none;
            width: 1.2rem;
            height: 1.2rem;
            margin-left: 8px;
        }

        /* Tối ưu cho di động */
        @media (max-width: 576px) {
            .registration-card {
                border-radius: 24px;
            }

            .card-header {
                padding: 35px 20px 10px;
            }

            .card-body {
                padding: 25px !important;
            }

            .row>div {
                margin-bottom: 0px;
            }

            /* Giảm khoảng cách row trên mobile */
        }

        /* Hiệu ứng xuất hiện mượt mà */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .registration-card {
            animation: fadeIn 0.6s ease-out;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card registration-card">
            <div class="card-header p-4 text-center">
                <h3 class="fw-bold text-primary mb-1">ĐĂNG KÝ TƯ VẤN HỌC TẬP</h3>
                <p class="text-muted small">Thầy Du Gia Văn sẽ trực tiếp hỗ trợ bạn</p>
            </div>

            <div class="card-body p-4">
                <form id="admissionForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Họ và tên học sinh</label>
                            <input type="text" name="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" name="phone" class="form-control" placeholder="0839xxxxxx" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ nhà</label>
                        <input type="text" name="address" class="form-control"
                            placeholder="Số nhà, tên đường, phường/xã..." required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Đang học lớp mấy?</label>
                            <select name="grade" class="form-select" required>
                                <option value="">Chọn lớp...</option>
                                <option value="Lớp 6">Lớp 6</option>
                                <option value="Lớp 7">Lớp 7</option>
                                <option value="Lớp 8">Lớp 8</option>
                                <option value="Lớp 9">Lớp 9</option>
                                <option value="Lớp 10">Lớp 10</option>
                                <option value="Lớp 11">Lớp 11</option>
                                <option value="Lớp 12">Lớp 12</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Điểm số hiện tại</label>
                            <input type="text" name="currentScore" class="form-control"
                                placeholder="VD: 7.5 hoặc Khá/Giỏi" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ngày rảnh (để thầy tiện liên hệ)</label>
                        <input type="text" name="freeTime" class="form-control"
                            placeholder="VD: Sáng thứ 7, Chiều tối các ngày trong tuần..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mong muốn của phụ huynh & học sinh</label>
                        <textarea name="expectations" class="form-control" rows="3"
                            placeholder="Chia sẻ mục tiêu hoặc khó khăn hiện tại của học sinh..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-submit py-3 mt-2" id="submitBtn">
                        <span class="submit-text">GỬI THÔNG TIN ĐĂNG KÝ</span>
                        <span class="loading spinner-border spinner-border-sm ms-2" role="status"></span>
                    </button>
                </form>

                <div id="responseMsg" class="mt-4 p-3 border border-success rounded text-center"
                    style="display:none; background-color: #f6fff6;">
                    <h5 class="text-success fw-bold mb-2">Đăng ký thành công!</h5>
                    <p class="mb-0 text-dark">Cảm ơn bạn đã tin tưởng. <strong>Thầy Du Gia Văn</strong> sẽ sớm liên hệ
                        để tư vấn lộ trình học tập phù hợp nhất.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwo-JCY7pMtCS3Y1gad329Nh4NUY_ItGiOOnad3muvn2F_jznsVLR8828bRhncdVpcNcA/exec';
        const form = document.getElementById('admissionForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();

            btn.disabled = true;
            btn.querySelector('.submit-text').innerText = 'Đang gửi dữ liệu...';
            btn.querySelector('.loading').style.display = 'inline-block';
            msg.style.display = 'none';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
                .then(response => {
                    msg.style.display = "block";
                    form.reset();
                    // Cuộn xuống thông báo
                    msg.scrollIntoView({ behavior: 'smooth' });
                })
                .catch(error => {
                    alert("Có lỗi xảy ra khi gửi. Vui lòng kiểm tra kết nối mạng.");
                    console.error('Error!', error.message);
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.querySelector('.submit-text').innerText = 'GỬI THÔNG TIN ĐĂNG KÝ';
                    btn.querySelector('.loading').style.display = 'none';
                });
        });
    </script>

</body>

</html>
