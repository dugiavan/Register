<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tư Vấn - Thầy Du Gia Văn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-hover: #1e3a8a;
            --accent: #6366f1;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #64748b;
            --glass: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.7);
            --shadow-soft: 0 10px 30px -10px rgba(15, 23, 42, 0.12);
        }

        body {
            background-color: var(--bg-body);
            background-image:
                radial-gradient(circle at 25% 25%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(30, 64, 175, 0.06) 0%, transparent 50%);
            background-size: 120% 120%;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            padding: 20px 0;
            overflow-x: hidden;
        }

        .registration-card {
            max-width: 680px;
            width: 95%;
            margin: auto;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow:
                var(--shadow-soft),
                0 25px 50px -12px rgba(15, 23, 42, 0.15),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.6);
            overflow: hidden;
            animation: fadeInScale 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .card-header {
            padding: 52px 48px 28px;
            text-align: center;
            position: relative;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            border-radius: 999px;
        }

        .card-header h3 {
            font-weight: 800;
            font-size: 2.1rem;
            letter-spacing: -0.04em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #1e2937, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-header p {
            color: var(--text-sub);
            font-size: 1.02rem;
            line-height: 1.5;
        }

        .form-label {
            font-size: 0.82rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #334155;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding-left: 4px;
        }

        .form-control,
        .form-select {
            padding: 16px 20px;
            border-radius: 18px;
            border: 1.5px solid #e2e8f0;
            background-color: rgba(255, 255, 255, 0.85);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 5px rgba(30, 64, 175, 0.12);
            transform: translateY(-2px);
        }

        /* Nút sang trọng kiểu premium */
        .btn-submit {
            background: linear-gradient(135deg, var(--primary), #3b82f6);
            padding: 17px 32px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: -0.01em;
            border: none;
            color: white;
            width: 100%;
            margin-top: 32px;
            box-shadow: 0 15px 25px -8px rgba(30, 64, 175, 0.4);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.6s;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -8px rgba(30, 64, 175, 0.5);
        }

        .btn-submit:hover::before {
            left: 200%;
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        #responseMsg {
            border-radius: 20px;
            padding: 22px !important;
            font-weight: 500;
            box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.1);
        }

        /* Mobile optimization */
        @media (max-width: 576px) {
            .registration-card {
                border-radius: 28px;
                margin: 10px;
            }

            .card-header {
                padding: 40px 24px 20px;
            }

            .card-header h3 {
                font-size: 1.85rem;
            }
        }

        /* === SUCCESS MESSAGE - PREMIUM STYLE === */
        #responseMsg {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(134, 239, 172, 0.4);
            border-radius: 28px;
            box-shadow:
                0 20px 25px -5px rgba(0, 0, 0, 0.1),
                0 8px 10px -6px rgba(0, 0, 0, 0.1),
                inset 0 2px 0 0 rgba(255, 255, 255, 0.8);
            animation: successPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 580px;
            margin: 24px auto;
            overflow: hidden;
        }

        .success-container {
            max-width: 460px;
            margin: 0 auto;
        }

        .success-icon {
            font-size: 4.2rem;
            color: #22c55e;
            filter: drop-shadow(0 10px 15px rgba(34, 197, 94, 0.3));
            animation: iconScale 0.8s ease;
        }

        @keyframes successPop {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(30px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes iconScale {
            0% {
                transform: scale(0.4);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Hover effect nhẹ cho card thông báo */
        #responseMsg:hover {
            transform: translateY(-4px);
            box-shadow:
                0 25px 35px -8px rgba(0, 0, 0, 0.12),
                0 10px 15px -3px rgba(34, 197, 94, 0.15);
            transition: all 0.4s ease;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card registration-card">
            <div class="card-header p-4 text-center">
                <h3 class="fw-bold text-primary mb-1">ĐĂNG KÝ TƯ VẤN HỌC TẬP</h3>
                <p class="text-muted small">Thầy Du Gia Văn sẽ trực tiếp hỗ trợ bạn</p>
            </div>

            <div class="card-body p-4">
                <form id="admissionForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Họ và tên học sinh</label>
                            <input type="text" name="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="tel" name="phone" class="form-control" placeholder="0839xxxxxx" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Địa chỉ nhà</label>
                        <input type="text" name="address" class="form-control"
                            placeholder="Số nhà, tên đường, phường/xã..." required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Đang học lớp mấy?</label>
                            <select name="grade" class="form-select" required>
                                <option value="">Chọn lớp...</option>
                                <option value="Lớp 6">Lớp 6</option>
                                <option value="Lớp 7">Lớp 7</option>
                                <option value="Lớp 8">Lớp 8</option>
                                <option value="Lớp 9">Lớp 9</option>
                                <option value="Lớp 10">Lớp 10</option>
                                <option value="Lớp 11">Lớp 11</option>
                                <option value="Lớp 12">Lớp 12</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Điểm số hiện tại</label>
                            <input type="text" name="currentScore" class="form-control"
                                placeholder="VD: 7.5 hoặc Khá/Giỏi" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Ngày rảnh (để thầy tiện liên hệ)</label>
                        <input type="text" name="freeTime" class="form-control"
                            placeholder="VD: Sáng thứ 7, Chiều tối các ngày trong tuần..." required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mong muốn của phụ huynh & học sinh</label>
                        <textarea name="expectations" class="form-control" rows="3"
                            placeholder="Chia sẻ mục tiêu hoặc khó khăn hiện tại của học sinh..." required></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 btn-submit py-3 mt-2" id="submitBtn">
                        <span class="submit-text">GỬI THÔNG TIN ĐĂNG KÝ</span>
                        <span class="loading spinner-border spinner-border-sm ms-2" role="status"></span>
                    </button>
                </form>

                <div id="responseMsg" class="mt-4 p-5 text-center" style="display: none;">
                    <div class="success-container">
                        <!-- Icon thành công đẹp -->
                        <div class="success-icon mb-4">
                            <i class="bi bi-check-circle-fill"></i>
                        </div>

                        <h4 class="fw-bold text-success mb-3">Đăng ký thành công!</h4>

                        <p class="mb-4 text-dark" style="font-size: 1.05rem; line-height: 1.6;">
                            Cảm ơn bạn đã tin tưởng!<br>
                            <strong>Thầy Du Gia Văn</strong> sẽ sớm liên hệ qua điện thoại hoặc Zalo<br>
                            để tư vấn lộ trình học tập phù hợp nhất cho bạn.
                        </p>

                        <div class="small text-muted">
                            <i class="bi bi-clock"></i>
                            TRANG CHỦ HỆ THỐNG HỌC TẬP THẦY DU GIA VĂN:
                            https://dugiavan.github.io/home/
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwo-JCY7pMtCS3Y1gad329Nh4NUY_ItGiOOnad3muvn2F_jznsVLR8828bRhncdVpcNcA/exec';
        const form = document.getElementById('admissionForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('responseMsg');

        form.addEventListener('submit', e => {
            e.preventDefault();

            btn.disabled = true;
            btn.querySelector('.submit-text').innerText = 'Đang gửi dữ liệu...';
            btn.querySelector('.loading').style.display = 'inline-block';
            msg.style.display = 'none';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
                .then(response => {
                    msg.style.display = "block";
                    form.reset();
                    // Cuộn xuống thông báo
                    msg.scrollIntoView({ behavior: 'smooth' });
                })
                .catch(error => {
                    alert("Có lỗi xảy ra khi gửi. Vui lòng kiểm tra kết nối mạng.");
                    console.error('Error!', error.message);
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.querySelector('.submit-text').innerText = 'GỬI THÔNG TIN ĐĂNG KÝ';
                    btn.querySelector('.loading').style.display = 'none';
                });
        });
    </script>

</body>

</html>
